name: Setup CI
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/uptime-monitor@v1.41.0
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          command: readme
      - uses: upptime/uptime-monitor@v1.41.0
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          command: site
      - uses: upptime/uptime-monitor@v1.41.0
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          command: graphs
      - uses: upptime/uptime-monitor@v1.41.0
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          command: response-time
      - uses: upptime/uptime-monitor@v1.41.0
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          command: summary
